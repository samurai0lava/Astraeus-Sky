services:
  # Frontend React application
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend-api
    networks:
      - astraeus-network

  # Backend NestJS API
  backend-api:
    build:
      context: ./BackEnd
      target: development
    ports:
      - "5000:5000"
    volumes:
      - ./BackEnd:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - N2YO_API_KEY=${N2YO_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
    depends_on:
      - redis
    networks:
      - astraeus-network

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - astraeus-network

networks:
  astraeus-network:
    driver: bridge

volumes:
  redis-data:
